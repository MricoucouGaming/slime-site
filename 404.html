<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page non trouvée</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #e0e7ff;
            --accent: #818cf8;
            --accent-bright: #6366f1;
            --danger: #f87171;
            --success: #4ade80;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 50%, #0f172a 100%);
            color: var(--secondary);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background elements */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(129, 140, 248, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(129, 140, 248, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .orbs {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--danger);
            bottom: -50px;
            left: 10%;
            animation-delay: 2s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: var(--accent-bright);
            top: 50%;
            left: -100px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(0, 50px); }
            75% { transform: translate(-30px, -20px); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 800px;
            margin: auto;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .number-404 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(120px, 25vw, 280px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--danger) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(129, 140, 248, 0.2);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
            color: var(--secondary);
        }

        .subtitle {
            font-size: clamp(16px, 3vw, 20px);
            color: rgba(224, 231, 255, 0.7);
            font-weight: 300;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 30px;
            text-transform: uppercase;
        }



        .decoration {
            position: absolute;
            font-size: 80px;
            opacity: 0.05;
            pointer-events: none;
        }

        .decoration-1 {
            top: 10%;
            left: 5%;
            animation: spin 15s linear infinite;
        }

        .decoration-2 {
            bottom: 15%;
            right: 8%;
            animation: spin 20s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-code {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--danger);
            margin-top: 30px;
            opacity: 0.6;
        }

        @media (max-width: 640px) {
            .decoration {
                display: none;
            }
        }
    </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELX6LVME54"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ELX6LVME54');
</script>

<body>
    <div class="background-grid"></div>
    
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="decoration decoration-1">🚀</div>
    <div class="decoration decoration-2">✨</div>

    <div class="container">
        <div class="status-badge">Erreur</div>
        
        <div class="number-404">404</div>
        
        <h1 class="title">Page Introuvable</h1>
        
        <p class="subtitle">
            Désolé, la page que vous recherchez n'existe pas ou a été déplacée.<br>
            Revenez à l'accueil pour continuer votre visite.
        </p>

        <div class="error-code">ERROR_PAGE_NOT_FOUND</div>
    </div>
</body>
</html>
